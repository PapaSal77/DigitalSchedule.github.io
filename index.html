<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Duty Roster</title>
    <style>
        :root {
            --team1-color: #2ecc71;
            --team2-color: #3498db;
            --weekend-color: #95a5a6;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            background: #f0f2f5; 
            color: #333;
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            display: inline-block; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            min-width: 300px;
        }
        h1 { margin-bottom: 10px; color: #555; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        #status { font-size: 4rem; font-weight: bold; margin: 20px 0; }
        #date-display { font-size: 1.1rem; color: #7f8c8d; }
        
        /* Dynamic Classes */
        .team-1 { color: var(--team1-color); }
        .team-2 { color: var(--team2-color); }
        .weekend { color: var(--weekend-color); }
    </style>
</head>
<body>

    <div class="card">
        <h1>On Duty Today</h1>
        <div id="status">Calculating...</div>
        <p id="date-display"></p>
    </div>

    <script>
        function updateSchedule() {
            const now = new Date();
            const dayOfWeek = now.getDay(); // 0=Sun, 1=Mon... 5=Fri, 6=Sat
            
            // 1. Display Current Date
            document.getElementById('date-display').innerText = now.toDateString();

            const statusEl = document.getElementById('status');

            // 2. Weekend Logic (Kuwait: Friday & Saturday)
            if (dayOfWeek === 5 || dayOfWeek === 6) {
                statusEl.innerText = "WEEKEND";
                statusEl.className = "weekend";
                return;
            }

            // 3. Alternating Logic
            // Anchor: Sunday, Jan 4, 2026 (Team 1 starts)
            const startDate = new Date("2026-01-04");
            
            // Calculate full days difference
            const diffInTime = now.getTime() - startDate.getTime();
            const diffInDays = Math.floor(diffInTime / (1000 * 3600 * 24));
            
            // If diffInDays is even (0, 2, 4...), it's Team 1. If odd, Team 2.
            if (diffInDays % 2 === 0) {
                statusEl.innerText = "TEAM 1";
                statusEl.className = "team-1";
            } else {
                statusEl.innerText = "TEAM 2";
                statusEl.className = "team-2";
            }
        }

        // Run on load
        updateSchedule();
    </script>
</body>
</html>
